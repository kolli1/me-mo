<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Reporter</title>
    <style>
        :root { --primary: #2c3e50; --success: #25D366; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        .stock-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        span { font-weight: 600; color: #34495e; }
        input { width: 75px; padding: 10px; border: 2px solid #dfe6e9; border-radius: 8px; text-align: center; font-size: 1.1rem; outline: none; -webkit-appearance: none; }
        input.low { border-color: var(--danger); background: #fff5f5; color: var(--danger); }
        .btn-wa { width: 100%; padding: 18px; border: none; border-radius: 12px; background: var(--success); color: white; font-weight: bold; font-size: 1.1rem; margin-top: 20px; cursor: pointer; }
        .back-btn { margin: 20px 0; color: #95a5a6; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; color:var(--primary);">Stock Report</h2>
        <div id="cont"></div>
        <button class="btn-wa" onclick="send()">Share to WhatsApp</button>
    </div>
    <a href="index.html" class="back-btn">← BACK TO HUB</a>
    <script>
        const skus = ["Vanilla", "Chocolate", "Strawberry", "Mango", "Grape", "Muskmelon", "Brownie", "Coconut", "Biscoff"];
        const cont = document.getElementById('cont');
        skus.forEach(s => {
            cont.innerHTML += `<div class="stock-row"><span>${s}</span><input type="number" class="qty" data-sku="${s}" placeholder="0" oninput="parseInt(this.value)<10?this.classList.add('low'):this.classList.remove('low')"></div>`;
        });
        function send() {
            const now = new Date().toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', hour12:true });
            let table = "```", low = [];
            document.querySelectorAll('.qty').forEach(i => {
                let v = i.value || "0";
                table += `${i.dataset.sku.padEnd(12)}: ${v.padStart(3)}\n`;
                if(parseInt(v) < 10 && i.value !== "") low.push(i.dataset.sku.toUpperCase());
            });
            let msg = `📦 *STOCK REPORT*\nTime: ${now}\n\n${table}\`\`\`\n`;
            if(low.length) msg += `━━━━━━━━━━━━━━━━━━\n🔴 *LOW STOCK ALERT:*\n${low.join(", ")}\n`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
