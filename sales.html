<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sales Logger</title>
    <style>
        :root { --success: #25D366; --swiggy: #fc8019; --zomato: #cb202d; --store: #3498db; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 420px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        .tabs { display: flex; background: #eee; border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; font-weight: bold; font-size: 0.85rem; background: transparent; color: #7f8c8d; cursor: pointer; }
        .tab-btn.active[data-p="Store"] { background: var(--store); color: white; }
        .tab-btn.active[data-p="Swiggy"] { background: var(--swiggy); color: white; }
        .tab-btn.active[data-p="Zomato"] { background: var(--zomato); color: white; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        span { font-weight: 600; color: #2c3e50; }
        input { width: 80px; padding: 12px; border: 2px solid #edeff2; border-radius: 10px; text-align: center; font-size: 1.1rem; outline: none; -webkit-appearance: none; }
        .btn-wa { width: 100%; padding: 18px; border: none; border-radius: 15px; background: var(--success); color: white; font-weight: bold; font-size: 1.1rem; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" data-p="Store" onclick="switchTab('Store')">STORE</button>
            <button class="tab-btn" data-p="Swiggy" onclick="switchTab('Swiggy')">SWIGGY</button>
            <button class="tab-btn" data-p="Zomato" onclick="switchTab('Zomato')">ZOMATO</button>
        </div>
        <div id="list"></div>
        <button class="btn-wa" onclick="send()">Share All Sales</button>
    </div>
    <a href="index.html" style="margin-top:20px; color:#95a5a6; text-decoration:none; font-weight:600; font-size:0.9rem;">← BACK TO HUB</a>
    <script>
        const skus = ["Vanilla", "Chocolate", "Strawberry", "Mango", "Grape", "Muskmelon", "Brownie", "Coconut", "Biscoff"];
        let p = "Store";
        let salesData = { Store: {}, Swiggy: {}, Zomato: {} };

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            skus.forEach(s => {
                const val = salesData[p][s] || "";
                list.innerHTML += `<div class="row"><span>${s}</span><input type="number" value="${val}" placeholder="0" oninput="save('${s}', this.value)"></div>`;
            });
        }
        function save(sku, val) { salesData[p][sku] = val; }
        function switchTab(val) { 
            p = val; 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-p="${val}"]`).classList.add('active');
            render(); 
        }
        function send() {
            let msg = `📊 *TOTAL SALES REPORT*\n\n`, grandTotal = 0;
            ["Store", "Swiggy", "Zomato"].forEach(plat => {
                let subTotal = 0, table = "";
                skus.forEach(s => { 
                    let v = parseInt(salesData[plat][s] || 0); 
                    if(v > 0) { table += `${s.padEnd(12)}: ${v}\n`; subTotal += v; } 
                });
                if(subTotal > 0) { 
                    msg += `*${plat.toUpperCase()}*\n\`\`\`${table}\`\`\`Subtotal: ${subTotal}\n\n`; 
                    grandTotal += subTotal; 
                }
            });
            if(grandTotal === 0) return alert("Please enter sales data!");
            msg += `━━━━━━━━━━━━━━━━━━\n*GRAND TOTAL: ${grandTotal} UNITS*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
        render();
    </script>
</body>
</html>
